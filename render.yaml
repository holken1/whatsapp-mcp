services:
  - type: web
    name: whatsapp-mcp
    runtime: python
    pythonVersion: "3.13"
    buildCommand: pip install -r requirements.txt
    startCommand: python3 whatsapp_server.py streamable-http
    envVars:
      - key: CALLMEBOT_PHONE
        sync: false
      - key: CALLMEBOT_APIKEY
        sync: false
      - key: BASE_URL
        value: https://whatsapp-mcp-s9zs.onrender.com
