services:
  - type: web
    name: whatsapp-mcp
    runtime: python
    pythonVersion: "3.13"
    buildCommand: pip install -r requirements.txt
    startCommand: python3 mcp_server.py streamable-http
    healthCheckPath: /health
    envVars:
      - key: CALLMEBOT_PHONE
        sync: false
      - key: CALLMEBOT_APIKEY
        sync: false
